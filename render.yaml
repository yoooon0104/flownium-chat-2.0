services:
  - type: web
    name: flownium-chat-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3010
      - key: FRONTEND_URL
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_SIGNUP_SECRET
        sync: false
      - key: ACCESS_TOKEN_EXPIRES_IN
        value: 1h
      - key: REFRESH_TOKEN_EXPIRES_IN
        value: 14d
      - key: SIGNUP_TOKEN_EXPIRES_IN
        value: 10m
      - key: KAKAO_REST_API_KEY
        sync: false
      - key: KAKAO_REDIRECT_URI
        sync: false
      - key: KAKAO_CLIENT_SECRET
        sync: false
